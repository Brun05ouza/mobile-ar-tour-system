name: ar_tour
description: Mobile AR Tour System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado global do app
  flutter_riverpod: ^2.5.1

  # Banco de dados local
  hive_flutter: ^1.1.0

  # AR
  ar_flutter_plugin: ^0.7.3

  # Utilitários
  path_provider: ^2.1.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/ar/